backup:
  auto_backup: false
  backup_dir: backups
  backup_interval_hours: 24
  max_backups: 10
editor:
  auto_save: true
  auto_save_interval: 60
  font_size: 14
  line_height: 1.8
language: zh
notifications:
  backup_reminder: true
  chapter_complete: true
  enabled: true
  sync_complete: true
theme: light
vector_retrieval:
  api_endpoint: https://api.siliconflow.cn/v1
  api_key: test-key
  embedding_model: bge-m3
  enabled: true
  timeout: 120
