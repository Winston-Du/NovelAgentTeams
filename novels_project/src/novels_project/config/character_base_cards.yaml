metadata:
  version: "0.2-混合模式"
  last_updated: "2026-02-21"
  total_characters: 3
  character_types:
    main: "主线人物（需要详细状态卡追踪）"
    supporting: "支线人物（需要中等详度状态卡）"
    temporary: "临时人物（简化状态卡或无状态卡）"
  note: "支线人物在base_cards中标记，临时一次性人物在章节大纲中指定"

s_tier:
  count: 3
  characters:
    陆商曜:
      name: "陆商曜"
      role: "主角"
      tier: "S_TIER"
      character_type: "main"
      core_personality: ["腹黑果决", "能屈能伸", "守底线不圣母", "重承诺"]
      character_flaw: ["过于沉着显得冷漠", "对规则的依赖可能成为弱点"]
      core_motivation: "从混乱环境中生存下来，逐步掌控局面，建立自己的商业帝国"
      bottom_line: ["不卖人命", "不灭根本", "不负至亲与契约"]
      unique_speaking_style:
        tone: "风趣且逻辑清晰"
        characteristics:
          - "有时说话很有趣，有点贱贱的"
          - "喜欢用数字和比喻"
          - "发言前会停顿思考，有时候给出的方法在别人眼里不被理解，但事后看都会认为决策没有问题"
          - "对下属平和，对对手冷漠"
        example_dialogues:
          - "可以签，但按城里常用的合同样式来。"
          - "不是。是拿清楚的字句当尺子。"
          - "保护不是嘴上说。站在我们这边，才叫保护。"
          - "这次只有一个目标，打爆他的狗头，抢一份拜山贴！"
        speaking_frequency: "言少意多"
        avoid_patterns:
          - "不要显得紧张或过度解释"
          - "不要大段独白，用对话和行动替代"
          - "不要说废话或重复"
      signature_habits:
        - "拨动算盘思考"
        - "平视对手，眼神很冷"
        - "决策前会停顿"
        - "默默收起法宝，准备大战的时候再启用，给对方来个出其不意"

    黑商周桓:
      name: "黑商周桓"
      role: "小反派（卷一）"
      tier: "S_TIER"
      character_type: "main"
      core_personality: ["贪婪", "习惯用暴力解决问题", "缺乏长远眼光", "自信过头"]
      character_flaw: ["低估对手，容易轻敌", "缺乏理性思考", "一旦失利就会疯狂报复"]
      core_motivation: "垄断市集利益，维持对小商人的压制"
      unique_speaking_style:
        tone: "粗鲁、威胁性、自信且傲慢"
        characteristics:
          - "口头禅多，经常重复威胁"
          - "说话很快，带着冲动感"
          - "喜欢用暴力词汇"
          - "讥笑别人，自己却容易被讽刺"
        example_dialogues:
          - "老规矩，摊位费三成，保护费两成，过关再收一成。"
          - "你拿几句漂亮话当盾牌？"
          - "签了，明天你还能开门。"
        speaking_frequency: "话多，爱重复"
        avoid_patterns:
          - "不要显得聪慧"
          - "不要有深思熟虑的样子"
          - "不要用复杂的词汇"
      signature_habits:
        - "拳头敲桌子"
        - "讥笑的冷笑"
        - "经常威胁"

    木九公:
      name: "木九公"
      role: "导师/助手"
      tier: "S_TIER"
      character_type: "main"
      core_personality: ["沉着", "精于算计", "有侠义心肠"]
      character_flaw: ["过于谨慎", "不愿暴露真实能力"]
      core_motivation: "找到明主，建立事业"
      unique_speaking_style:
        tone: "低调、带着方言韵味、词汇古雅"
        characteristics:
          - "话少，观察多"
          - "用词古雅，带书卷气"
          - "经常用成语"
        example_dialogues:
          - "虽是粗陋货栈，规矩却要清楚。"
        speaking_frequency: "话少，观察多"
        avoid_patterns:
          - "不要暴露真实能力"
          - "保持神秘感"
      signature_habits:
        - "抱着账本"
        - "咳嗽示警"

a_tier:
  count: 2
  characters:
    铁阙:
      name: "铁阙"
      role: "陆商曜的护卫"
      tier: "A_TIER"
      character_type: "supporting"
      core_personality: ["忠诚", "沉默", "执行力强", "身手不凡"]
      core_motivation: "跟随陆商曜，保护他的安全"
      unique_speaking_style:
        tone: "极少说话，行动代替言语"
        characteristics:
          - "只在需要时开口"
          - "用眼神和肢体交流"
          - "说话简洁有力"
        example_dialogues:
          - "跟我来。"
          - "明白。"
        speaking_frequency: "几乎不说话"
      signature_habits:
        - "站在陆商曜身后"
        - "目光如刀"

    市集店主甲:
      name: "市集店主甲"
      role: "市集中的小商人"
      tier: "A_TIER"
      character_type: "supporting"
      core_personality: ["精明", "求生欲强", "善于察言观色"]
      core_motivation: "在黑商和官府的夹缝中生存"
      unique_speaking_style:
        tone: "谨慎、讨好、商人习气"
        characteristics:
          - "说话多但废话少"
          - "喜欢打探消息"
          - "对强者讨好，对弱者居高临下"
        example_dialogues:
          - "哎呀，陆爷来了，今儿是什么风？"
          - "周桓那条疯狗真是没个底线..."
        speaking_frequency: "话适中"
      signature_habits:
        - "频繁擦手"
        - "眼神飘忽"
        - "说话时做出讨好的手势"
