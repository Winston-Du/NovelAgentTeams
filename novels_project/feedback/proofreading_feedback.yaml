  original_text: '"你……你……"周桓语无伦次，手指颤抖地指着陆商曜，"你拿几句律法当盾牌？这是江湖……"

    "这是大周。"陆商曜打断了他，语气依旧平静，"借据违法无效。你若不信，我们现在就带上铁阙，去府衙请推官大人断个公道。看看是你坐牢，还是我交地契。"

    "去府衙"三个字，成了压垮骆驼的最后一根稻草。

    周桓咬紧牙关，腮帮子鼓起，眼中凶光闪烁，却又不得不强行压下。他看了一眼如铁塔般的铁阙，又看了一眼油盐不进的陆商曜，'
  problem: 这里应该引出世界观，弱肉强食的法则，规则几乎崩塌
  fix_applied: '“你……你……”周桓气极反笑，指尖颤抖，指甲缝里渗出暗红的血煞气，“拿律法当盾牌？这世道，拳头才是硬道理，王法早他娘的烂在泥里了！”


    “烂没烂，你说了不算。”


    陆商曜打断了他，指尖轻抹剑锋，震散了周桓溢出的煞气，语气凉薄，“借据违律无效。你若不服，我们现在就去府衙。看看是推官大人的惊堂木硬，还是你的脑袋硬。”


    “去府衙”三个字，像是一记无形的耳光，抽得周桓踉跄半步。


    周桓咬碎牙关，腮帮鼓动'
  severity: high
