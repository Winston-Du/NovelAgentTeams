  original_text: '黑商周桓带着四个膀大腰圆的打手，堵在了门口。雨水顺着他油光发亮的秃顶往下流，滑过横肉丛生的脸，滴落在崭新的锦缎外袍上——那锦缎鲜亮得刺眼，与这发霉的货栈格格不入。

    '
  problem: 1. 周桓作为一个商人，雨天不可能不打伞直接来到店里;2. 周桓作为一个比较富裕的商人，人物刻画上要表现为油腻、肥胖，性格上阴险
  fix_applied: 黑商周桓撑着一柄描金油纸伞，慢悠悠踱至门口，身后四个膀大腰圆的打手如铁塔般压住雨幕。他圆滚的身子裹在崭新锦缎外袍里，衣料鲜亮得刺眼，与这发霉的货栈格格不入；伞沿滴落的雨水，顺着他油光锃亮的秃顶滑下，淌过堆叠的横肉，在肥厚的下巴上悬了片刻，才“啪”地砸在绣着金线的前襟上。
  severity: medium
