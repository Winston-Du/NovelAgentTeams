# ================================================================
# 章节修正清单
# ================================================================
#
# 用法（只需指定文件名，脚本自动在 DESIGN/FIX/ 目录下查找）:
#   预览: python scripts/fix_chapter.py --batch fix_issues_0308.yaml --dry-run
#   执行: python scripts/fix_chapter.py --batch fix_issues_0308.yaml
#
# 提示：original_text 如果包含空行，请用双引号包裹并用 \n 表示换行，
#       或者用 | 块但确保所有行（包括空行）都保持缩进。
# ================================================================

issues:
  # ---- 第2处：打伞却淋雨 ----
  - chapter_id: 1
    original_text: |
      伞沿滴落的雨水，顺着他油光锃亮的秃顶滑下，淌过堆叠的横肉，在肥厚的下巴上悬了片刻，才"啪"地砸在绣着金线的前襟上。
    problem: "逻辑问题，既然周桓是打着伞来的，为什么雨水还会滴落到脑袋上？"
    issue_type: "逻辑问题"
    severity: high

  # ---- 第3处：需要引出世界观 ----
  - chapter_id: 1
    original_text: |
      "你……你……"周桓语无伦次，手指颤抖地指着陆商曜，"你拿几句律法当盾牌？这是江湖……"
      "这是大周。"陆商曜打断了他，语气依旧平静，"借据违法无效。你若不信，我们现在就带上铁阙，去府衙请推官大人断个公道。看看是你坐牢，还是我交地契。"
      "去府衙"三个字，成了压垮骆驼的最后一根稻草。
    problem: "这里应该引出世界观，弱肉强食的法则，规则几乎崩塌"
    severity: high
