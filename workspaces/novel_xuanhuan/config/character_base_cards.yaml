metadata:
  version: 0.3-故事一致性修复
  last_updated: '2026-02-22'
  total_characters: 5
  story_world: 大周商律世界
  protagonist: 陆商曜
  note: 所有人物必须与此卡库保持一致，Agent 不得擅自创建新主角
s_tier:
  count: 3
  characters:
    陆商曜:
      role: 主角
      brief: ''
    黑商周桓:
      name: 黑商周桓
      role: 小反派（卷一）
      tier: S_TIER
      character_type: main
      identity: 市集恶霸，赤鲸帮头目
      age: 三十多岁
      appearance: 身材魁梧，脸上有刀疤，常带打手
      core_personality:
      - 贪婪
      - 习惯用暴力解决问题
      - 缺乏长远眼光
      - 自信过头
      character_flaw:
      - 低估对手，容易轻敌
      - 缺乏理性思考
      - 一旦失利就会疯狂报复
      core_motivation: 垄断市集利益，维持对小商人的压制
      unique_speaking_style:
        tone: 粗鲁、威胁性、自信且傲慢
        characteristics:
        - 口头禅多，经常重复威胁
        - 说话很快，带着冲动感
        - 喜欢用暴力词汇
        - 讥笑别人，自己却容易被讽刺
        example_dialogues:
        - 老规矩，摊位费三成，保护费两成，过关再收一成。
        - 你拿几句漂亮话当盾牌？
        - 签了，明天你还能开门。
        speaking_frequency: 话多，爱重复
        avoid_patterns:
        - 不要显得聪慧
        - 不要有深思熟虑的样子
        - 不要用复杂的词汇
      signature_habits:
      - 拳头敲桌子
      - 讥笑的冷笑
      - 经常威胁
    木九公:
      name: 木九公
      role: 导师/助手
      tier: S_TIER
      character_type: main
      identity: 陆商曜的账房先生，隐藏高手
      age: 六十左右
      appearance: 佝偻着背，抱着破账本，常咳嗽示警
      core_personality:
      - 沉着
      - 精于算计
      - 有侠义心肠
      character_flaw:
      - 过于谨慎
      - 不愿暴露真实能力
      core_motivation: 找到明主，建立事业
      unique_speaking_style:
        tone: 低调、带着方言韵味、词汇古雅
        characteristics:
        - 话少，观察多
        - 用词古雅，带书卷气
        - 经常用成语
        example_dialogues:
        - 虽是粗陋货栈，规矩却要清楚。
        speaking_frequency: 话少，观察多
        avoid_patterns:
        - 不要暴露真实能力
        - 保持神秘感
      signature_habits:
      - 抱着账本
      - 咳嗽示警
      hidden_abilities:
      - 身手不凡（隐藏）
      - 精通账目和商业规则
a_tier:
  count: 2
  characters:
    铁阙:
      name: 铁阙
      role: 陆商曜的护卫
      tier: A_TIER
      character_type: supporting
      identity: 沉默寡言的武者
      age: 二十五六
      appearance: 身材高大，目光如刀，常站在陆商曜身后
      core_personality:
      - 忠诚
      - 沉默
      - 执行力强
      - 身手不凡
      core_motivation: 跟随陆商曜，保护他的安全
      unique_speaking_style:
        tone: 极少说话，行动代替言语
        characteristics:
        - 只在需要时开口
        - 用眼神和肢体交流
        - 说话简洁有力
        example_dialogues:
        - 跟我来。
        - 明白。
        speaking_frequency: 几乎不说话
      signature_habits:
      - 站在陆商曜身后
      - 目光如刀
    市集店主甲:
      name: 市集店主甲
      role: 市集中的小商人
      tier: A_TIER
      character_type: supporting
      identity: 在黑商和官府夹缝中求生的小商人
      core_personality:
      - 精明
      - 求生欲强
      - 善于察言观色
      core_motivation: 在黑商和官府的夹缝中生存
      unique_speaking_style:
        tone: 谨慎、讨好、商人习气
        characteristics:
        - 说话多但废话少
        - 喜欢打探消息
        - 对强者讨好，对弱者居高临下
        example_dialogues:
        - 哎呀，陆爷来了，今儿是什么风？
        - 周桓那条疯狗真是没个底线...
        speaking_frequency: 话适中
      signature_habits:
      - 频繁擦手
      - 眼神飘忽
      - 说话时做出讨好的手势
rules:
  character_consistency:
  - 所有 Agent 必须严格使用上述人物设定，不得擅自创建新主角
  - 人物姓名、性格、说话风格必须与卡库一致
  - 如需新角色，必须在章大纲中明确标注为'临时人物'
  story_world:
    setting: 大周朝，商业繁荣但帮派横行
    power_structure: 官府 > 大商贾 > 帮派 > 小商人
    legal_system: 《大周商律》是核心规则体系
  protagonist_journey:
    volume_1_goal: 立信立威，初谋关税
    starting_point: 市集开局，落魄货栈遭围堵
    key_abilities:
    - 契约古印
    - 商业头脑
    - 术修能力
b_tier:
  测试人物_OWL:
    role: 测试角色
    brief: 这是一个用于测试的人物
